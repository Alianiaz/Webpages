<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trainer Dashboard</title>
    <link rel="stylesheet" href="Dashboard.CSS">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
<!-- DAshboard -->
    <div class="dashboard">
<!-- Sidebar -->
        <div class="sidebar">
<!-- Logo -->
            <div class="logo">
           <div class="logo-content">
            <i class="fa-solid fa-grip-lines" style="color: #000;"></i>
            <h1>JEDI</h1>  
           </div>
           </div>
<!-- nav -->
       <div class="Navbar">
<!-- Icons -->
           <div class="icons">
            <i class="fa-solid fa-house" style="color: #000;"></i>
            <h3>Home</h3>
           </div>

            <div class="icons">
                <i class="fa-solid fa-calendar" style="color: #000;"></i>
                <h3>Schedule</h3>
            </div>

            <div class="icons">
                <i class="fa-solid fa-graduation-cap" style="color: #000;"></i>
                <h3>Trainers</h3>
            </div>

            <div class="icons">
                <i class="fa-solid fa-shield" style="color: #000;"></i>
                <h3>Public Library</h3>
            </div>

            <div class="icons">
                <i class="fa-solid fa-gear" style="color: #000;"></i>
                <h3>Preference</h3>
            </div>

            <div class="icons">
                <i class="fa-solid fa-right-from-bracket" style="color: #000;"></i>
                <h3>Log out</h3>
            </div>
       </div>  
       
       <div class="bottom">
            <div class="icons">
                <i class="fa-solid fa-gear" style="color: #000;"></i>
                <h3>Preference</h3>
            </div>

            <div class="icons">
                <i class="fa-solid fa-right-from-bracket" style="color: #000;"></i>
                <h3>Log out</h3>
            </div>
       </div>
        </div>
        
<!-- Content -->
        <div class="content">
<!-- head -->
          <div class="head">
            <div class="h-icon">
                <i class="fa-solid fa-arrow-left" style="color: #000;"></i>
            </div>
<!-- Search Bar -->
            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass" style="color: #000;"></i>
                <div class="bar">
                    <input placeholder="Find courses, trainers, etc">
                </div>
            </div>
 <!-- profile-icon --> 

            <div class="profile">
                <i class="fa-solid fa-bell" style="color: #000;"></i>
                <img src="images/Profile-logo.jpg"> 
            </div>
          </div>

<!-- Trainer -->
        </div>
    </div>
</body>
</html>
